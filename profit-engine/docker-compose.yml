version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: python api/server.py
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
